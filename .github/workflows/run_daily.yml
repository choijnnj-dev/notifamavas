name: Daily Panchang Checker

on:
  schedule:
    # 17:00 UTC triggers exactly at 19:00 (7:00 PM) Netherlands Local Time
    - cron: '0 17 * * *'
  workflow_dispatch: 

jobs:
  check-panchang:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Essential Core Engines
      run: |
        pip install requests pytz ephem

    - name: Run Code
      run: python panchang_bot.py

    - name: Prevent GitHub from pausing this script due to inactivity
      if: github.event_name == 'schedule'
      uses: liskin/gh-workflow-keepalive@v1
